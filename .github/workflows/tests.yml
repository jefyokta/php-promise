name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.1, 8.2, 8.3]
        swoole: ['5.1', '6.0']

    name: PHP ${{ matrix.php }} - Swoole ${{ matrix.swoole }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: swoole-${{ matrix.swoole }}
          tools: composer:v2
          coverage: none

      - name: Check PHP version
        run: php --version

      - name: Check Swoole version
        run: php -r "echo 'Swoole version: ' . swoole_version() . PHP_EOL;"

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php }}-swoole-${{ matrix.swoole }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-swoole-${{ matrix.swoole }}-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run tests
        run: ./vendor/bin/pest